<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Wislab - Werkblad</title>
	<link rel="icon" href="assets/fav.png" type="image/png">
	<style>
		:root {
			--paper-width: 210mm;
			--paper-height: 297mm;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: #f2f2f2;
			font-family: "Trebuchet MS", Verdana, sans-serif;
		}

		.toolbar {
			max-width: var(--paper-width);
			margin: 12px auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 0 8px;
		}

		.toolbar button,
		.toolbar a {
			font-size: 1rem;
			padding: 8px 12px;
			display: inline-block;
			background: #ffffff;
			color: var(--accent, #2b7a78);
			border: 1px solid rgba(0, 0, 0, 0.06);
			border-radius: 6px;
			text-decoration: none;
			box-shadow: 0 4px 10px rgba(11,11,11,0.03);
			transition: transform .08s ease, background .08s ease;
		}
		.toolbar button:hover,
		.toolbar a:hover{
			transform: translateY(-1px);
			background: linear-gradient(#fff,#f7f9f9);
		}

		.sheet {
			width: var(--paper-width);
			min-height: var(--paper-height);
			margin: 0 auto 16px;
			background: #ffffff;
			padding: 16mm;
			box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
			display: grid;
			grid-template-rows: auto 1fr auto;
		}

		.sheet-header {
			display: grid;
			grid-template-columns: 1fr auto;
			grid-template-areas:
				"spacer name"
				"title title";
			row-gap: 2mm;
			margin-bottom: 6mm;
		}

		h1 {
			margin: 0;
			text-align: center;
			font-size: 30px;
		}

		.sheet-header h1 {
			grid-area: title;
		}

		.name-field {
			grid-area: name;
			justify-self: end;
			align-self: start;
			display: flex;
			align-items: center;
			gap: 2mm;
			font-size: 14px;
		}

		.name-input {
			width: 52mm;
			border: none;
			border-bottom: 1px solid rgba(0, 0, 0, 0.8);
			font-size: 14px;
			padding: 0 0 1mm;
			font-family: inherit;
			background: transparent;
		}

		.name-input:focus {
			outline: none;
		}

		.meta {
			margin: 0 0 8mm;
			text-align: center;
			font-size: 14px;
		}

		/* table layout: two columns, 10 rows, sized to fit the sheet area */
		.exercise-list,
		#exerciseList {
			display: block;
			height: 100%;
		}

		.exercise-table {
			width: 100%;
			height: 100%;
			border-collapse: collapse;
			table-layout: fixed;
		}

		.exercise-table td {
			border: 1px solid rgba(0,0,0,0.65);
			vertical-align: top;
			padding: 6mm 5mm;
			box-sizing: border-box;
		}

		.exercise-table tbody tr {
			height: calc(100% / 10);
		}

		.exercise-title {
			font-size: 18px;
			line-height: 1;
			text-align: left;
			margin-bottom: 5mm;
		}

		.work-area {
			min-height: 1px;
			height: calc(100% - 18px - 5mm);
		}

		.wizard-wrap {
			margin-top: 10mm;
			text-align: center;
		}

		.wizard {
			width: 500px;
			max-width: 70%;
			height: auto;
		}

		.empty {
			text-align: center;
			margin-top: 30px;
		}

		.hidden {
			display: none;
		}

		@page {
			size: A4;
			margin: 10mm;
		}

		@media print {
			body {
				background: #ffffff;
			}

			.toolbar {
				display: none;
			}

			.sheet {
				box-shadow: none;
				margin: 0;
				width: 100%;
				height: calc(297mm - 20mm);
				min-height: calc(297mm - 20mm);
				padding: 0;
				grid-template-rows: auto auto minmax(0, 1fr) auto;
				row-gap: 4mm;
			}

			.sheet-header {
				margin-bottom: 4mm;
			}

			h1 {
				font-size: 28px;
				margin: 0;
			}

			.name-field {
				font-size: 13px;
			}

			.sheet.hide-empty-name .name-field {
				display: none;
			}

			.name-input {
				width: 46mm;
				font-size: 13px;
			}

			.meta {
				margin: 0;
			}

			.exercise-list,
			#exerciseList {
				height: 100%;
				min-height: 0;
				overflow: hidden;
			}

			.exercise-table {
				height: 100%;
			}

			.exercise-table td {
				padding: 5mm 5mm;
			}

			.exercise-title {
				font-size: 18px;
				margin-bottom: 4mm;
			}

			.wizard-wrap {
				margin-top: 0;
				height: 26mm;
				display: flex;
				align-items: flex-end;
				justify-content: center;
			}

			.wizard {
				width: auto;
				max-width: 62%;
				max-height: 24mm;
			}
		}
	</style>
</head>
<body data-page="worksheet">
	<div class="toolbar">
		<a href="index.html">Terug</a>
		<button id="printButton" type="button">Print</button>
	</div>

	<main class="sheet">
		<div class="sheet-header">
			<h1>Werkblad Rekenen</h1>
			<label class="name-field" for="studentName">Naam:
				<input id="studentName" class="name-input" type="text" autocomplete="off">
			</label>
		</div>
		<p id="worksheetMeta" class="meta"></p>
		<div id="exerciseList" class="exercise-list"></div>
		<div class="wizard-wrap">
			<img class="wizard" src="assets/Wizard.png"/>
		</div>
		<div id="emptyState" class="empty hidden">
			Geen werkblad gevonden. Ga terug en genereer eerst oefeningen.
		</div>
	</main>

	<script src="generateSheet.js"></script>
</body>
</html>
